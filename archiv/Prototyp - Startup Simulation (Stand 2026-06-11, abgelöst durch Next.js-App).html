<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Founder's Run — VCM Startup-Simulation (Prototyp)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#141414;--raised:#1c1c1c;--fg:#edebe8;--s1:#1c1c1c;--s2:#242424;--s3:#2c2c2c;
    --muted:#888;--border:rgba(255,255,255,.07);--accent:#ff5e00;--success:#4ade80;--error:#f87171;
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:#0e0e0e;color:var(--fg);min-height:100dvh;
    font-family:"Plus Jakarta Sans",system-ui,sans-serif;letter-spacing:-.01em;-webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;padding:24px 12px;
  }
  .stage{width:100%;max-width:430px}
  .phone{
    width:100%;background:var(--bg);border-radius:32px;border:1px solid rgba(255,255,255,.08);
    overflow:hidden;position:relative;min-height:660px;
    background-image:radial-gradient(60% 50% at 15% 0%,rgba(255,94,0,.05),transparent 70%),radial-gradient(50% 50% at 100% 100%,rgba(255,94,0,.035),transparent 70%);
    box-shadow:0 30px 80px rgba(0,0,0,.5);
  }
  .screen{padding:24px 18px 28px;display:flex;flex-direction:column;min-height:660px}
  .caption{text-align:center;color:#666;font-size:12px;margin-top:14px}
  .label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .card{background:var(--s1);border:1px solid var(--border);border-radius:24px}
  .inner{background:var(--s2);border-radius:16px}
  .grad{background:linear-gradient(135deg,#f76c07,#fe281f);-webkit-background-clip:text;background-clip:text;color:transparent}
  .logo{display:block;margin:0 auto;width:170px;max-width:74%;border-radius:16px;border:1px solid var(--border)}
  h1{font-size:28px;font-weight:800;line-height:1.15;letter-spacing:-.03em;margin:0}
  h2{font-size:21px;font-weight:700;letter-spacing:-.02em;margin:0}
  .opt{width:100%;text-align:left;background:var(--s2);border:1.5px solid transparent;border-radius:16px;padding:13px 14px;color:var(--fg);font-size:13.5px;font-weight:500;cursor:pointer;font-family:inherit;transition:transform .12s,border-color .2s,opacity .2s;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .opt:hover:not(:disabled){border-color:rgba(255,255,255,.18)}
  .opt:active:not(:disabled){transform:scale(.98)}
  .opt:disabled{cursor:default}
  .btn{width:100%;border-radius:16px;padding:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .12s}
  .btn:active{transform:scale(.98)}
  .btn:disabled{opacity:.4;cursor:default}
  .btn-primary{background:linear-gradient(var(--s2),var(--s2)) padding-box,linear-gradient(135deg,#f76c07,#fe281f) border-box;border:1.5px solid transparent;color:var(--fg)}
  .btn-glass{background:var(--s2);border:1px solid var(--border);color:var(--fg)}
  .chip{border-radius:999px;padding:2px 8px;font-size:10px;font-weight:600;font-variant-numeric:tabular-nums;display:inline-block}
  .track{height:6px;width:100%;background:var(--s3);border-radius:999px;overflow:hidden}
  .fill{height:100%;border-radius:999px;transition:width .6s var(--ease)}
  .fade{animation:fade .45s var(--ease) both}
  @keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .recap{border:1px solid var(--border);border-radius:18px;overflow:hidden;background:var(--s1)}
  .recaphead{width:100%;display:flex;justify-content:space-between;align-items:center;gap:8px;padding:13px;background:none;border:none;color:var(--fg);cursor:pointer;text-align:left;font-family:inherit}
  .ico{width:48px;height:48px;border-radius:50%;background:rgba(255,94,0,.12);display:flex;align-items:center;justify-content:center;font-size:24px}
  .flex1{flex:1;display:flex;flex-direction:column}
  .step{width:30px;height:30px;border-radius:10px;background:var(--s2);border:1px solid var(--border);color:var(--fg);font-size:18px;font-weight:600;cursor:pointer;font-family:inherit;line-height:1}
  .step:active{transform:scale(.94)}
</style>
</head>
<body>
<div class="stage">
  <div class="phone"><div class="screen" id="root"></div></div>
  <div class="caption">Founder's Run · Prototyp für den Venture-Club-Infostand — am besten am Handy öffnen</div>
</div>

     +'<div class="ico" style="margin:0 auto">⚡</div>'
     +'<div class="label" style="margin-top:12px">Zufallsereignis</div>'
     +'<h2 style="margin:4px 0 0">'+ev.title+'</h2>'
     +'<p style="font-size:13px;line-height:1.6;color:#888;margin:8px auto 0;max-width:290px">'+ev.text+'</p>'
     +'<div style="display:flex;justify-content:center;margin-top:14px">'+chips(ev.eff)+'</div>'
     +'<button class="btn btn-primary" style="margin-top:22px" id="next">Weiter →</button></div>';
    root.innerHTML='<div class="flex1">'+simHead()+body+'</div>';
    document.getElementById("next").onclick=advance;
  }
  function allocScreen(){
    if(!S.alloc){
      var pot=Math.min(18000,Math.floor(S.stats.cash/3000)*3000);
      S.alloc={pot:pot,step:3000,confirmed:false,buckets:[
        {label:"Bessere KI & Produkt",stat:"innovation",amt:0},
        {label:"Werbung & Reichweite",stat:"growth",amt:0},
        {label:"Team & Community",stat:"community",amt:0},
        {label:"Verantwortung & Datenschutz",stat:"impact",amt:0}
      ]};
    }
    var a=S.alloc;
    var used=a.buckets.reduce(function(s,b){return s+b.amt;},0);
    var rem=a.pot-used;
    var body;
    if(a.pot<3000 && !a.confirmed){
      body='<div class="card fade" style="margin-top:14px;padding:22px;text-align:center;flex:1;display:flex;flex-direction:column;justify-content:center">'
       +'<div class="ico" style="margin:0 auto">💸</div><div class="label" style="margin-top:12px">Geld investieren</div>'
       +'<h2 style="margin:4px 0 0">Kasse fast leer</h2>'
       +'<p style="font-size:13px;line-height:1.6;color:#888;margin:8px auto 0;max-width:280px">Gerade bleibt nichts zum Investieren übrig. Auch das ist eine Lektion: Ohne Geld auf dem Konto hast du keinen Spielraum.</p>'
       +'<button class="btn btn-primary" style="margin-top:22px" id="next">Weiter →</button></div>';
      root.innerHTML='<div class="flex1">'+simHead()+body+'</div>';
      document.getElementById("next").onclick=advance;return;
    }
    if(!a.confirmed){
      var rows=a.buckets.map(function(b,i){var m=STAT[b.stat];
        return '<div class="inner" style="padding:12px;display:flex;align-items:center;justify-content:space-between;gap:10px"><div style="flex:1"><div style="font-size:13px;font-weight:600">'+b.label+'</div><div style="font-size:11px;color:'+m.c+'">'+m.e+' stärkt '+m.l+'</div></div>'
         +'<div style="display:flex;align-items:center;gap:8px"><button class="step" data-m="-" data-i="'+i+'">−</button><span style="min-width:62px;text-align:center;font-size:13px;font-weight:600;font-variant-numeric:tabular-nums">'+money(b.amt)+'</span><button class="step" data-m="+" data-i="'+i+'">+</button></div></div>';
      }).join("");
      body='<div style="margin-top:16px;flex:1;display:flex;flex-direction:column"><div class="label">Bonus-Runde · Geld investieren</div>'
       +'<h2 style="font-size:21px;line-height:1.25;margin:6px 0 0">Wohin fließt dein Geld?</h2>'
       +'<p style="font-size:13.5px;line-height:1.6;color:#888;margin:8px 0 0">Du hast frisches Geld — von Förderung, Investor oder dem Climate Hack. Verteile <b style="color:#EDEBE8">'+money(a.pot)+'</b> auf die Bereiche. Du kannst nicht alles gleich stark fördern.</p>'
       +'<div style="margin:14px 0 10px;display:flex;justify-content:space-between;align-items:center"><span class="label">Noch zu verteilen</span><span style="font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;color:'+(rem===0?"#4ade80":"#FF5E00")+'">'+money(rem)+'</span></div>'
       +'<div style="display:flex;flex-direction:column;gap:8px">'+rows+'</div>'
       +'<button class="btn btn-primary" style="margin-top:16px" id="confirm" '+(rem!==0?"disabled":"")+'>'+(rem!==0?"Verteile dein ganzes Geld":"Investieren →")+'</button></div>';
      root.innerHTML='<div class="flex1">'+simHead()+body+'</div>';
      Array.prototype.forEach.call(root.querySelectorAll(".step"),function(btn){btn.onclick=function(){var i=+btn.dataset.i;var b=a.buckets[i];if(btn.dataset.m==="+"){if(rem>=a.step)b.amt+=a.step;}else{if(b.amt>=a.step)b.amt-=a.step;}render();};});
      var cf=document.getElementById("confirm");if(cf&&rem===0)cf.onclick=function(){
        a.buckets.forEach(function(b){S.stats[b.stat]+=(b.amt/3000)*4;});
        S.stats.cash=Math.max(0,S.stats.cash-used);S.points+=12;a.used=used;a.confirmed=true;render();
      };
      return;
    }
    var gains={};a.buckets.forEach(function(b){if(b.amt>0)gains[b.stat]=(b.amt/3000)*4;});gains.cash=-a.used;
    body='<div class="card fade" style="margin-top:14px;padding:16px"><div style="display:flex;justify-content:space-between;align-items:center"><span class="label">Investiert</span><span class="chip" style="font-size:11px;padding:3px 9px;background:rgba(74,222,128,.12);color:#4ade80">+12 Punkte</span></div>'
     +'<p style="font-size:13px;line-height:1.6;margin:8px 0 0">Du hast '+money(a.used)+' eingesetzt und klare Schwerpunkte gesetzt. Genau das ist Gründen: begrenztes Geld dort einsetzen, wo es am meisten bringt.</p>'
     +'<div style="margin-top:12px">'+chips(gains)+'</div>'
     +'<button class="btn btn-primary" style="margin-top:16px" id="next">Weiter →</button></div>';
    root.innerHTML='<div class="flex1">'+simHead()+'<div style="flex:1;display:flex;flex-direction:column;justify-content:center">'+body+'</div></div>';
    document.getElementById("next").onclick=advance;
  }
  function advance(){S.chosen=null;var nx=S.step+1;if(nx>=S.timeline.length){S.screen="result";render();return;}var up=S.timeline[nx];if(up.type==="e")apply(S.stats,up.ev.eff);S.step=nx;render();}
  function result(){
    var ty=ftype(S.stats);var sc=score(S.stats,S.points);
    var recs=S.records.map(function(r,i){var open=S.open[i];
      var alts=r.alts.map(function(a){return '<div style="display:flex;gap:8px;font-size:12px"><span style="color:#888;margin-top:1px">✕</span><div><span style="font-weight:600">'+a.label+'</span> <span style="font-variant-numeric:tabular-nums;color:'+(a.pts>=0?"#4ade80":"#f87171")+'">('+(a.pts>=0?"+":"")+a.pts+')</span><p style="color:#888;margin:2px 0 0">'+a.out+'</p></div></div>';}).join("");
      return '<div class="recap"><button class="recaphead" data-r="'+i+'"><div style="min-width:0;flex:1"><div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#888">Phase '+r.sc.phase+' · '+r.sc.title+'</div><div style="font-size:13px;font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"><span style="color:#FF5E00">✓</span> '+r.chosen.label+'</div></div><span style="color:#888;display:inline-block;transition:transform .25s;transform:rotate('+(open?180:0)+'deg)">▾</span></button>'
       +(open?'<div class="fade" style="padding:0 13px 13px"><div class="inner" style="padding:12px"><div style="display:flex;justify-content:space-between"><span style="font-size:10px;font-weight:600;text-transform:uppercase;color:#FF5E00">Deine Wahl</span><span style="font-size:11px;font-weight:600;font-variant-numeric:tabular-nums;color:'+(r.chosen.pts>=0?"#4ade80":"#f87171")+'">'+(r.chosen.pts>=0?"+":"")+r.chosen.pts+'</span></div><p style="font-size:12.5px;margin:6px 0 0">'+r.chosen.out+'</p></div><p style="font-size:10px;font-weight:600;text-transform:uppercase;color:#888;margin:12px 0 8px">Was die Alternativen gebracht hätten</p><div style="display:flex;flex-direction:column;gap:8px">'+alts+'</div></div>':"")+'</div>';}).join("");
    root.innerHTML='<div class="fade" style="display:flex;flex-direction:column;gap:14px">'
     +'<div class="card" style="padding:24px;text-align:center"><div class="label">Dein Ergebnis</div>'
     +'<div style="font-size:46px;margin-top:6px">'+ty.e+'</div>'
     +'<h1 style="font-size:23px;margin:6px 0 0">'+ty.n+'</h1>'
     +'<p style="font-size:13px;font-weight:600;margin:4px 0 0" class="grad">'+ty.t+'</p>'
     +'<p style="font-size:13px;line-height:1.6;color:#888;margin:10px auto 0;max-width:280px">'+ty.d+'</p>'
     +'<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:18px"><span style="font-size:20px">🏆</span><span style="font-size:30px;font-weight:800;font-variant-numeric:tabular-nums">'+sc+'</span><span style="font-size:13px;color:#888">Punkte</span></div></div>'
     +'<div class="card" style="padding:16px"><div class="label">Deine Startup-Werte</div><div style="margin-top:12px">'+statGrid(S.stats)+'</div></div>'
     +'<div style="display:flex;flex-direction:column;gap:8px"><div class="label" style="padding:0 4px">Deine Entscheidungen im Rückblick</div>'+recs+'</div>'
     +'<button class="btn btn-primary" id="toclose">Weiter →</button>'
     +'<button class="btn btn-glass" id="restart">↻ Nochmal spielen</button></div>';
    Array.prototype.forEach.call(root.querySelectorAll(".recaphead"),function(b){b.onclick=function(){var i=+b.dataset.r;S.open[i]=!S.open[i];render();};});
    document.getElementById("toclose").onclick=function(){S.closing=true;render();};
    document.getElementById("restart").onclick=function(){reset();render();};
  }
  function closing(){
    root.innerHTML='<div class="fade flex1" style="justify-content:center;gap:18px;text-align:center">'
     +'<img class="logo" src="'+LOGO_END+'" alt="Venture Club Münster" style="width:200px">'
     +'<div><h1 style="font-size:26px">Vom Spieler zum <span class="grad">echten Gründer.</span></h1>'
     +'<p style="font-size:13.5px;line-height:1.6;color:#888;max-width:300px;margin:8px auto 0">Hat dir die Reise gefallen? Beim Venture Club Münster baust du genau das — mit echten Startups, einem starken Netzwerk und Leuten, die gründen wollen wie du.</p></div>'
     +'<div class="card" style="padding:18px;text-align:left"><div style="display:flex;flex-direction:column;gap:10px;font-size:13px">'+["Echte Startup-Projekte & Workshops","Netzwerk aus Foundern, VCs & Talenten","Events wie die Startup Contacts & der Climate Hack"].map(function(f){return '<div style="display:flex;align-items:center;gap:8px"><span style="color:#FF5E00">✓</span>'+f+'</div>';}).join("")
     +'</div><div style="margin-top:16px;border-radius:16px;padding:12px;text-align:center;background:rgba(255,94,0,.1)"><p style="font-size:13px;font-weight:600;margin:0">🚀 Neuaufnahmen im <span class="grad">Oktober</span></p><p style="font-size:11px;color:#888;margin:2px 0 0">Komm am Infostand vorbei & sichere dir die Infos.</p></div></div>'
     +'<button class="btn btn-glass" id="restart2">↻ Nochmal spielen</button></div>';
    document.getElementById("restart2").onclick=function(){reset();render();};
  }
  reset();render();
})();
</script>
</body>
</html>
